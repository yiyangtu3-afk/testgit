name: campuslink

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: campuslink
      MYSQL_USER: campuslink
      MYSQL_PASSWORD: campuslink123
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - campuslink-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: >-
        jdbc:mysql://mysql:3306/campuslink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: campuslink
      SPRING_DATASOURCE_PASSWORD: campuslink123
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/api/database/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5179:80"

volumes:
  campuslink-mysql:
